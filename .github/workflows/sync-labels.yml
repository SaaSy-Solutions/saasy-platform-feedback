name: Sync repository labels

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/sync-labels.yml

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something is not working as expected' },
              { name: 'qa-finding', color: 'b60205', description: 'Finding discovered during quality assurance testing' },
              { name: 'accessibility', color: '5319e7', description: 'Accessibility or assistive technology concern' },
              { name: 'documentation', color: '0075ca', description: 'Documentation improvement or correction' },
              { name: 'feature-request', color: 'a2eeef', description: 'New capability or product improvement' },
              { name: 'needs-triage', color: 'fbca04', description: 'Awaiting initial review and classification' },
              { name: 'needs-information', color: 'd4c5f9', description: 'More information is required from the reporter' },
              { name: 'confirmed', color: '0e8a16', description: 'Issue has been reproduced or validated' },
              { name: 'accepted', color: '1d76db', description: 'Accepted for internal planning' },
              { name: 'planned', color: '0052cc', description: 'Planned for a future release' },
              { name: 'in-progress', color: '006b75', description: 'Work is currently underway' },
              { name: 'released', color: '0e8a16', description: 'Fix or feature has been released' },
              { name: 'declined', color: 'ffffff', description: 'Request was reviewed and declined' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical impact requiring immediate attention' },
              { name: 'priority-high', color: 'd93f0b', description: 'High-priority issue or request' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium-priority issue or request' },
              { name: 'priority-low', color: 'c2e0c6', description: 'Low-priority issue or request' },
              { name: 'authentication', color: 'bfdadc', description: 'Authentication, authorization, or account access' },
              { name: 'onboarding', color: 'c5def5', description: 'Business or user onboarding experience' },
              { name: 'billing', color: 'f9d0c4', description: 'Billing, subscriptions, invoices, or payments' },
              { name: 'agents', color: '7057ff', description: 'AI agents, workflows, or agent behavior' },
              { name: 'integrations', color: '008672', description: 'External integrations or connected services' },
              { name: 'ui-ux', color: 'e99695', description: 'User interface or user experience' },
              { name: 'mobile', color: '84b6eb', description: 'Mobile device or responsive experience' },
              { name: 'api', color: '006b75', description: 'API behavior, endpoints, or developer experience' },
              { name: 'duplicate', color: 'cfd3d7', description: 'Duplicate of an existing issue' },
              { name: 'cannot-reproduce', color: 'ffffff', description: 'Unable to reproduce with available information' },
              { name: 'working-as-designed', color: 'ededed', description: 'Current behavior matches intended design' },
              { name: 'not-planned', color: 'ffffff', description: 'Not currently planned for implementation' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  });
                } else {
                  throw error;
                }
              }
            }
