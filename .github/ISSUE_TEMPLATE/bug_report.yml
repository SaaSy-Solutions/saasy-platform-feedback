name: Bug report
description: Report reproducible behavior that is not working as expected
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Do not include secrets, customer data, or security vulnerability details.
  - type: input
    id: area
    attributes:
      label: Affected area
      description: What page, workflow, integration, or feature is affected?
      placeholder: Onboarding, CRM, billing, agents, integrations, etc.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Clearly describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Every time
        - Often
        - Sometimes
        - Once
        - Unknown
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, device, and app environment when known.
      placeholder: Chrome 128, Windows 11, desktop, production
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recordings, or safe logs
      description: Redact all personal, tenant, credential, and confidential information.
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocking - cannot continue
        - High - major feature unavailable
        - Medium - workaround exists
        - Low - minor or cosmetic
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed sensitive and customer-identifying information.
          required: true
        - label: This is not a security vulnerability.
          required: true
