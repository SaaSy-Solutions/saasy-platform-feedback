name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Start with the problem and desired outcome. Product requests may be discussed, declined, or moved to a private roadmap.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem are you trying to solve, and who experiences it?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should users be able to accomplish?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Example workflow
      description: Describe a realistic use case or user journey.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Current workaround or alternatives
  - type: textarea
    id: value
    attributes:
      label: Expected value
      description: Explain the expected customer or business benefit.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues for similar requests.
          required: true
        - label: This request contains no confidential or customer-identifying information.
          required: true
